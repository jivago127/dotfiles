
[env]
TERM = "xterm-256color"

[window]
decorations = "buttonless"
dynamic_padding = false
opacity = 1

[window.dimensions]
columns = 80
lines = 20

[window.padding]
x = 10
y = 10

[font]
size = 15

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[font.bold_italic]
family = "FiraCode Nerd Font"
style = "Bold Italic"

[general]
live_config_reload = true

import = [
   "~/.config/alacritty/themes/themes/alabaster_dark.toml"
]
